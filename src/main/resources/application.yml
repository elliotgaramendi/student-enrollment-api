spring:
  application:
    name: student-enrollment-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/student_enrollment_db}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:student_user}
    password: ${DB_PASSWORD:student_password}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
