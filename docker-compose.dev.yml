services:
  app:
    image: student-enrollment-api-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: mvn spring-boot:run
    environment:
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    volumes:
      - maven_cache:/root/.m2
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /workspace/src
        - action: rebuild
          path: ./pom.xml

volumes:
  maven_cache:
