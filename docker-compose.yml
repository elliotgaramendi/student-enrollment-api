services:
  mysql:
    image: mysql:8.0
    container_name: student-enrollment-mysql
    environment:
      MYSQL_DATABASE: student_enrollment_db
      MYSQL_USER: student_user
      MYSQL_PASSWORD: student_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-enrollment-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/student_enrollment_db
      DB_USERNAME: student_user
      DB_PASSWORD: student_password
      JPA_DDL_AUTO: update
    ports:
      - "8080:8080"

volumes:
  mysql_data:
